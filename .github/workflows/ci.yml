name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint with pre-commit (gitleaks, ruff, sqlfluff, hygiene)
        run: uv run pre-commit run --all-files --show-diff-on-failure

      - name: Run pipeline (dlt -> DuckDB -> dbt build via Prefect)
        run: make pipeline

      - name: Build static site (marimo WASM + dbt docs)
        run: make site
